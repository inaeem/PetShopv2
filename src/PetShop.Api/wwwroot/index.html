<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pet Shop — Portal</title>
    <link rel="stylesheet" href="css/site.css" />
</head>
<body>
    <header class="topbar">
        <h1>🐾 Pet Shop Portal</h1>
        <div id="authStatus" class="auth-status">No token</div>
    </header>

    <main>
        <!-- Provide a token -->
        <section class="card" id="authCard">
            <h2>Authentication</h2>
            <p class="hint">The API requires a bearer token on every request. Paste a JWT
                obtained from your token issuer (signed with the shared key).</p>
            <form id="tokenForm">
                <label>JWT <input id="tokenInput" placeholder="eyJhbGciOi…" autocomplete="off" /></label>
                <button type="submit">Use token</button>
                <button type="button" id="clearTokenBtn" class="secondary">Clear</button>
            </form>
        </section>

        <!-- Pets -->
        <section class="card">
            <h2>Available pets</h2>
            <div class="search-row">
                <input id="searchTerm" placeholder="Search by name or breed…" />
                <button id="searchBtn">Search</button>
                <button id="refreshBtn" class="secondary">Show all</button>
            </div>
            <ul id="petList" class="pet-list"></ul>
        </section>

        <!-- Messaging board (static, client-side) -->
        <section class="card">
            <h2>Message board</h2>
            <p class="hint">A lightweight static messaging area. Notes are stored in your browser.</p>
            <form id="messageForm">
                <input id="messageInput" placeholder="Leave a message about a pet…" />
                <button type="submit">Post</button>
            </form>
            <ul id="messageList" class="message-list"></ul>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
